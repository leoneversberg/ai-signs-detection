categories:
  - name: undue_emphasis_on_significance_legacy_and_broader_trends
    description: >
      LLM writing often puffs up the importance of the subject matter by
      adding statements about how arbitrary aspects of the topic represent or
      contribute to a broader topic. There is a distinct and easily identifiable
      repertoire of ways that it writes these statements.
      Words to watch: stands/serves as, is a testament/reminder, a vital/significant/crucial/pivotal/key role/moment, 
      underscores/highlights its importance/significance, reflects broader, 
      symbolizing its ongoing/enduring/lasting, contributing to the, setting the stage for,
      marking/shaping the, represents/marks a shift, key turning point,
      evolving landscape, focal point, indelible mark, deeply rooted, ...
    examples:
      - The Statistical Institute of Catalonia was officially established in
        1989, marking a pivotal moment in the evolution of regional statistics
        in Spain.
  - name: superficial_analyses
    description: >
      I chatbots tend to insert superficial analysis of information, often in relation to its significance, recognition, or impact.
      This is often done by attaching a present participle ("-ing") phrase at the end of sentences, sometimes with vague attributions to third parties.
      Words to watch: highlighting/underscoring/emphasizing ..., ensuring ..., reflecting/symbolizing ..., contributing to ..., cultivating/fostering ...,
      encompassing ..., valuable insights, align/resonate with, ...
    examples:
      - As of the April 2008 census, the population of Douera stood at approximately 56,998 inhabitants, creating a lively community within its borders. 
      - The civil rights movement emerged as a powerful continuation of this struggle, emphasizing the importance of solidarity and collective action in the fight for justice. 
  - name: promotional_and_advertisement_like_language
    description: >
      LLMs have serious problems keeping a neutral tone. 
      Even when prompted to use an encyclopedic tone, and even when editors have no promotional interest in a topic, their output will often tend toward advertisement-like writing, or like the prose of a travel guide.
      This may happen when generating new text or rewriting existing text; they often insert promotional language while claiming they removed it.
      Words to watch: boasts a, vibrant, rich, profound, enhancing, showcasing, exemplifies, commitment to, natural beauty, nestled, in the heart of, groundbreaking, renowned, featuring, diverse array,  ...
    examples:
      - Nestled within the breathtaking region of Gonder in Ethiopia, Alamata Raya Kobo stands as a vibrant town with a rich cultural heritage and a significant place within the Amhara region. 
      - These projects align with KQ's goals of reducing its environmental footprint, improving operational efficiency, and fostering community development through job creation. 
      - The SOLLEI’s exterior design communicates a powerful emotional presence, staying true to Cadillac's signature bold proportions.
  - name: high_density_of_ai_vocabulary_words
    description: >
      Many studies have demonstrated that LLMs overuse specific words.
      They often co-occur in LLM output: where there is one, there are likely others. 
      Words to watch: Additionally (especially beginning a sentence), align with, boasts (meaning "has"), bolstered, crucial, delve,
      emphasizing, enduring, enhance, fostering, garner, highlight (as a verb), interplay, intricate/intricacies, key (as an adjective), 
      landscape (as an abstract noun), meticulous/meticulously, pivotal, showcase,
      tapestry (as an abstract noun), testament, underscore (as a verb), valuable, vibrant
    examples:
      - Additionally, Somali merchants played a pivotal role in the global
        coffee trade, being one of the first to export coffee beans.
  - name: negative_parallelisms
    description: >
      When LLMs describe a subject, their output may seem as though it is
      clearing up a common misconception, or as though the audience may be
      reaching an incomplete or incorrect conclusion about that subject. This
      kind of contrast can come across as trying to retroactively challenge such
      thinking by pointing out another characteristic that the subject may
      possess alongside (or in the place of) one or more previously-mentioned
      characteristics.
      "Not just X, but also Y": It is common for LLMs to use parallel constructions involving "not", "but", or "however" such as "Not only ... but ..." or "It is not just ..., it's ..."
      "Not X, but Y": Another common LLM pattern is parallelisms that explicitly state that a particular item doesn't possess the first characteristic at all. Such constructions are often expressed as "It's not ..., it's ..." or "no ..., no ..., just ..."
    examples:
      - It's not just about the beat riding under the vocals; it's part of the
        aggression and atmosphere.
      - The viewer is presented with a self-image that is not grounded in visual
        mastery, but in what Amelia Jones terms “the performative enactment of
        subjectivity”.
  - name: rule_of_three
    description: >
      LLMs overuse the 'rule of three'. This can take different forms,
      from "adjective, adjective, adjective" to "short phrase, short phrase, and
      short phrase". LLMs often use this structure to make superficial analyses
      appear more comprehensive.
    examples:
      - The Amaze Conference brings together global SEO professionals, marketing
        experts, and growth hackers to discuss the latest trends in digital
        marketing. The event features keynote sessions, panel discussions, and
        networking opportunities.
  - name: title_case
    description: >
      In section headings, AI chatbots strongly tend to capitalize all main words.
    examples:
      - "Global Context: Critical Mineral Demand"
      - Strategic Negotiations and Global Partnerships
      - "High-Stakes Deals: Glencore, China, and Russia"
  - name: overuse_of_em_dashes
    description: >
      While human editors and writers often use em dashes (—), LLM output
      uses them more often than nonprofessional human-written text of the same
      genre, and uses them in places where humans are more likely to use commas,
      parentheses, colons, or (misused) hyphens (-) and en dashes (–). LLMs
      especially tend to use em dashes in a formulaic, pat way, often mimicking
      "punched up" sales-like writing by over-emphasizing clauses or
      parallelisms.
    examples:
      - You're right about one thing — we do seem to have different
        interpretations of what policy-based discussion entails.
  - name: emoji_as_formatting
    description: >
      LLMs often use emojis in a formulaic way to "punch up" writing,
      especially in the style of sales copy or listicles.  They are often used
      at the beginning of sentences, and often co-occur with other "AI sign"
      features.
    examples:
      - "Let’s decode exactly what’s happening here: 🧠 Cognitive Dissonance
        Pattern: You’ve proven authorship, demonstrated originality, and
        introduced new frameworks, yet they’re defending a system that
        explicitly disallows recognition of originators unless a third party
        writes about them first."
      - "🧱 Structural Gatekeeping: Wikipedia policy favors: [...]"